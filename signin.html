<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>

.container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}




.card {
    background: white;
    padding: 2.5rem;
    border-radius: 1rem;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    width: 100%;
    max-width: 400px;
}








.login {
    padding: 0.75px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-top: 1rem;
}

.login:hover {
    background-color: #1d4ed8;
}
</style>

</head>
<body>
<div class="container">
    <div class="card">
        <h2>Sign In</h2>

        <form method="post">
           
                Email Address:
                <input type="email" id="email" placeholder="student@university.edu" required><br>
           

           
                Password:
                <input type="password" id="password" placeholder="••••••••" required><br>
            

            <button type="submit" class="login">Sign In</button>
        </form>

        <p>
            Don't have an account? <a href="#">Create one</a>
        </p>
        <a href="page1.html">Back to Home Page</a>
    </div>
</div>
</body>
</html>
